# MISHKA IoT System - Docker Compose Configuration
#
# LOCAL DEVELOPMENT (Fast, Windows/Mac/Linux):
#   docker compose up -d --build              # Rebuild all and start
#   docker compose up -d --build web-app      # Rebuild specific service
#   docker compose logs -f web-app            # Watch logs
#
# PRODUCTION DEPLOYMENT (RPI5):
#   git tag alpha && git push origin RPI --tags   # Trigger multi-arch build
#   ssh pi@<ip> && cd ~/mishka-hub/RPI
#   docker compose pull && docker compose up -d   # Deploy from GHCR
#
# See LOCAL_DEVELOPMENT_GUIDE.md for detailed workflow

services:
  # Base Images - Built first, used by all services
  # Note: These don't run as services, they just ensure base images are built
  mishka-python-base:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile-python-base
    image: mishka-python-base:latest
    profiles:
      - build-only

  mishka-service-base:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile-service-base
      args:
        PYTHON_BASE_IMAGE: mishka-python-base:latest
    image: mishka-service-base:latest
    depends_on:
      - mishka-python-base
    profiles:
      - build-only

  timescale-database:
    image: timescale/timescaledb:2.17.2-pg17
    container_name: Database-Timescale
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
      # For db_maintenance.sh script
      DATABASE_HOST: timescale-database
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - timescale_database_data:/var/lib/postgresql/data
      - ./services/shared/database:/docker-entrypoint-initdb.d:ro
      # Custom PostgreSQL config (SD card optimized) - falls back to defaults if file is empty/missing
      - ./services/shared/database/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./services/shared/database/db_maintenance.sh:/usr/local/bin/db_maintenance.sh:ro
    # Use custom config if present (file validated by install script)
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  web-app:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile-web-app
      args:
        SERVICE_BASE_IMAGE: mishka-service-base:latest
        VITE_API_BASE_URL: ${WEB_UI_VITE_API_BASE_URL:-http://localhost:8000}
        VITE_MQTT_URL: ${WEB_UI_VITE_MQTT_URL:-ws://localhost:9001/mqtt}
        VITE_MQTT_USERNAME: ${WEB_UI_VITE_MQTT_USERNAME:-}
        VITE_MQTT_PASSWORD: ${WEB_UI_VITE_MQTT_PASSWORD:-}
        VITE_APP_BASE_PATH: ${WEB_UI_VITE_APP_BASE_PATH:-/}
    container_name: Web-Application-UI
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_NAME: ${DATABASE_NAME}
      MQTT_HOST: ${MQTT_HOST}
      MQTT_PORT: ${MQTT_PORT}
      PROJECT_ROOT: /host_project
      COMPOSE_PROJECT_NAME: rpi
    volumes:
      - shared_device_data:/shared_data
      - /var/run/docker.sock:/var/run/docker.sock  # Docker socket for container management
      # Mount config file (Linux only - Windows bakes it into the image)
      - /opt/mishka/config.json:/app/config.json
      - /opt/mishka/firmware:/app/firmware:ro  # Read-only access to OTA firmware storage for USB flashing
      - /tmp:/tmp  # Shared /tmp for OTA update trigger files
      # - /sys/class/bluetooth:/sys/class/bluetooth:ro  # Read-only access to Bluetooth info (Linux only)
      - /proc:/host_proc:ro  # Read-only access to host process info for CPU/RAM metrics
      - /sys/class/net:/host_sys_net:ro  # Read-only access to network interfaces for WiFi signal
      - /run/dbus:/run/dbus:ro  # D-Bus socket for NetworkManager access (WiFi scan)
      - type: bind
        source: ${HOST_PROJECT_ROOT:-.}
        target: /host_project
    working_dir: /app
    ports:
      - "8000:8000"  # API and UI on same port
    devices:
      - /dev:/dev  # Access to all devices for USB flashing
    # Note: group_add removed - not needed when running with privileged mode
    # The privileged flag provides full Docker socket access
    privileged: true  # Required for Docker socket access and system updates
    depends_on:
      - timescale-database
      - database-setup
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  http-data-uploader:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile-http-data-uploader
      args:
        SERVICE_BASE_IMAGE: mishka-service-base:latest
    container_name: HTTP-BLE-Data-Uploader
    environment:
      DATABASE_URL: ${DATABASE_URL}
      HTTP_WORKERS: ${HTTP_WORKERS}
      HTTP_BATCH_SIZE: ${HTTP_BATCH_SIZE}
      HTTP_RETRY_DELAY: ${HTTP_RETRY_DELAY}
      HTTP_MAX_RETRIES: ${HTTP_MAX_RETRIES}
    volumes:
      - /opt/mishka/config.json:/app/config.json  # Mount config file
    depends_on:
      - timescale-database
      - database-setup
    restart: always

  database-setup:
    image: timescale/timescaledb:2.17.2-pg17
    container_name: Database-Setup
    depends_on:
      - timescale-database
    volumes:
      - ./services/shared/database:/database-assets:ro
    command: >
      /bin/sh -c '
        set -e
        echo "[database-setup] Waiting for database ${DATABASE_HOST}/${DATABASE_NAME}..."
        until pg_isready -h "${DATABASE_HOST}" -U "${DATABASE_USER}" -d "${DATABASE_NAME}" >/dev/null 2>&1; do
          echo "[database-setup] Database not ready yet, sleeping..."
          sleep 1
        done
        echo "[database-setup] Database is ready."
        export PGPASSWORD="${DATABASE_PASSWORD}"
        
        # Step 1: Apply initial schema (creates all tables for fresh databases)
        if [ -f /database-assets/initial_schema.sql ]; then
          echo "[database-setup] Running initial_schema.sql (creates base schema)..."
          psql -v ON_ERROR_STOP=1 -h "${DATABASE_HOST}" -U "${DATABASE_USER}" -d "${DATABASE_NAME}" -f /database-assets/initial_schema.sql
          echo "[database-setup] ✅ Initial schema applied"
        else
          echo "[database-setup] ERROR: initial_schema.sql not found"
          exit 1
        fi
        
        # Step 2: Apply migrations (updates existing databases to current schema)
        if [ -f /database-assets/schema_migrations.sql ]; then
          echo "[database-setup] Running schema_migrations.sql (applies incremental changes)..."
          psql -v ON_ERROR_STOP=1 -h "${DATABASE_HOST}" -U "${DATABASE_USER}" -d "${DATABASE_NAME}" -f /database-assets/schema_migrations.sql
          echo "[database-setup] ✅ Migrations applied"
        else
          echo "[database-setup] WARNING: schema_migrations.sql not found, skipping migrations"
        fi
        
        echo "[database-setup] ✅ Database setup complete."
      '
    environment:
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}

  mqtt-broker:
    image: eclipse-mosquitto:latest
    container_name: MQTT-Broker
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./services/shared/mosquitto/config:/mosquitto/config
      - ./services/shared/mosquitto/data:/mosquitto/data
      - ./services/shared/mosquitto/log:/mosquitto/log
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -t health/check -m test"]
      interval: 30s
      timeout: 10s
      retries: 3

  pgweb:
    image: sosedoff/pgweb:latest
    container_name: PostgreSQL-Browser
    restart: unless-stopped
    profiles:
      - data-analysis
    ports:
      - "8081:8081"
    networks:
      - default
    volumes:
      - pgweb_bookmarks:/home/pgweb/.pgweb
    environment:
      PGWEB_DATABASE_URL: postgres://${DATABASE_USER}:${DATABASE_PASSWORD}@timescale-database:5432/${DATABASE_NAME}?sslmode=disable
    depends_on:
      - timescale-database
    entrypoint: /bin/sh
    command:
      - -c
      - |
        # Volume is mounted but may have permission issues, pgweb auto-creates if needed
        pgweb --bind=0.0.0.0 --listen=8081 \
          --readonly \
          --url=postgres://${DATABASE_USER}:${DATABASE_PASSWORD}@timescale-database:5432/${DATABASE_NAME}?sslmode=disable

  mqtt-data-processor:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile-mqtt-processor
      args:
        SERVICE_BASE_IMAGE: mishka-service-base:latest
    image: mqtt-data-processor
    container_name: MQTT-Data-Processor
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - MQTT_HOST=${MQTT_HOST}
      - MQTT_PORT=${MQTT_PORT}
      - DEFAULT_TIMER_GROUP_ID=${DEFAULT_TIMER_GROUP_ID}
      - MQTT_CALLBACK_API_VERSION=2
      - BLE_PROCESSOR_MIN_WORKERS=${BLE_PROCESSOR_MIN_WORKERS:-2}
      - BLE_PROCESSOR_MAX_WORKERS=${BLE_PROCESSOR_MAX_WORKERS:-12}
      - BLE_QUEUE_SCALE_UP=${BLE_QUEUE_SCALE_UP:-200}
      - BLE_QUEUE_SCALE_DOWN=${BLE_QUEUE_SCALE_DOWN:-50}
      - BLE_QUEUE_SCALE_INTERVAL=${BLE_QUEUE_SCALE_INTERVAL:-5}
    volumes:
      - /opt/mishka/config.json:/app/config.json  # Mount config file
    depends_on:
      - timescale-database
      - mqtt-broker
      - database-setup
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "/app/services/data_processing/mqtt_processor/healthcheck.py"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    logging:
      driver: "${LOG_DRIVER}"
      options:
        max-size: "${LOG_MAX_SIZE}"
        max-file: "${LOG_MAX_FILES}"

  device-config-manager:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile-device-config-manager
      args:
        SERVICE_BASE_IMAGE: mishka-service-base:latest
    image: device-config-manager
    container_name: MQTT-Device-Config-Manager
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - MQTT_HOST=${MQTT_HOST}
      - MQTT_PORT=${MQTT_PORT}
      - CONFIG_CHECK_INTERVAL=${CONFIG_CHECK_INTERVAL}
    volumes:
      - /opt/mishka/config.json:/app/config.json  # Mount config file
    depends_on:
      - timescale-database
      - mqtt-broker
      - database-setup
    restart: unless-stopped
    logging:
      driver: "${LOG_DRIVER}"
      options:
        max-size: "${LOG_MAX_SIZE}"
        max-file: "${LOG_MAX_FILES}"

  device-status-monitor:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile-device-monitor
      args:
        SERVICE_BASE_IMAGE: mishka-service-base:latest
    image: device-status-monitor
    container_name: Device-Status-Monitor
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - MQTT_HOST=${MQTT_HOST}
      - MQTT_PORT=${MQTT_PORT}
      - DEFAULT_TIMER_GROUP_ID=${DEFAULT_TIMER_GROUP_ID}
      - DEFAULT_MESH_ID=${DEFAULT_MESH_ID}
      - DEVICE_MONITOR_SYNC_INTERVAL=${DEVICE_MONITOR_SYNC_INTERVAL}  # Shared status file update interval (live UI updates)
    volumes:
      - shared_device_data:/shared_data
      - /opt/mishka/config.json:/app/config.json  # Mount config file
    depends_on:
      - timescale-database
      - mqtt-broker
      - database-setup
    restart: unless-stopped
    logging:
      driver: "${LOG_DRIVER}"
      options:
        max-size: "${LOG_MAX_SIZE}"
        max-file: "${LOG_MAX_FILES}"

  status-event-sender:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile-status-event-sender
      args:
        SERVICE_BASE_IMAGE: mishka-service-base:latest
    image: status-event-sender
    container_name: HTTP-Device-Status-Sender
    environment:
      - CONFIG_FILE=/app/config.json
      - STATUS_EVENT_FREQUENCY=${STATUS_EVENT_FREQUENCY}
      - STATUS_EVENT_ENABLED=${STATUS_EVENT_ENABLED}
    volumes:
      - /opt/mishka/config.json:/app/config.json
      - shared_device_data:/shared_data
    depends_on:
      - web-app
    restart: unless-stopped
    logging:
      driver: "${LOG_DRIVER}"
      options:
        max-size: "${LOG_MAX_SIZE}"
        max-file: "${LOG_MAX_FILES}"

  ntp-time-sync:
    image: cturra/ntp
    container_name: NTP-Time-Sync
    restart: unless-stopped
    profiles:
      - linux-hw
    network_mode: host
    cap_add:
      - SYS_TIME      # Add capability to modify system time
      - SYS_NICE      # Allow priority scheduling
    volumes:
      - /etc/localtime:/etc/localtime:ro  # Share host time
    environment:
      - NTP_SERVERS=${NTP_SERVERS}  # Multiple NTP servers for reliability

  ota-services:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile-ota-services
      args:
        SERVICE_BASE_IMAGE: mishka-service-base:latest
    image: ota-services
    container_name: OTA-Services
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_HOST=${DATABASE_HOST}
      - DATABASE_PORT=${DATABASE_PORT}
      - DATABASE_NAME=${DATABASE_NAME}
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - MQTT_HOST=${MQTT_HOST}
      - MQTT_PORT=${MQTT_PORT}
      - OTA_GITHUB_REPO=${OTA_GITHUB_REPO}
      - OTA_GITHUB_TOKEN=${OTA_GITHUB_TOKEN}
      - OTA_HTTP_SERVER_PORT=${OTA_HTTP_SERVER_PORT}
      - OTA_LOG_LEVEL=${OTA_LOG_LEVEL}
    volumes:
      - /opt/mishka/config.json:/app/config.json
      - /opt/mishka/firmware:/app/firmware  # Persistent firmware storage (read-write)
    ports:
      - "${OTA_HTTP_SERVER_PORT}:${OTA_HTTP_SERVER_PORT}"  # OTA HTTP server port
    depends_on:
      - timescale-database
      - mqtt-broker
      - database-setup
    logging:
      driver: "${LOG_DRIVER}"
      options:
        max-size: "${LOG_MAX_SIZE}"
        max-file: "${LOG_MAX_FILES}"

  wifi-manager:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile-wifi-manager
      args:
        SERVICE_BASE_IMAGE: mishka-service-base:latest
    image: wifi-manager
    container_name: WiFi-Manager
    profiles:
      - linux-hw
    restart: unless-stopped
    privileged: true  # Required for network management
    network_mode: host  # Required to manage host network interfaces
    environment:
      - CONFIG_FILE=/app/config.json
      - WIFI_SCAN_INTERVAL=${WIFI_SCAN_INTERVAL:-30}
      - WIFI_CONNECTION_TIMEOUT=${WIFI_CONNECTION_TIMEOUT:-20}
    volumes:
      - /opt/mishka/config.json:/app/config.json
      - /etc/NetworkManager:/etc/NetworkManager  # Access to NetworkManager config
      - /var/run/NetworkManager:/var/run/NetworkManager  # NetworkManager socket
      - /var/run/dbus:/var/run/dbus  # D-Bus system socket
      - /sys/class/net:/sys/class/net:ro  # Network interface info
    logging:
      driver: "${LOG_DRIVER}"
      options:
        max-size: "${LOG_MAX_SIZE}"
        max-file: "${LOG_MAX_FILES}"

  local-ble-scanner:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile-local-ble-scanner
      args:
        SERVICE_BASE_IMAGE: mishka-service-base:latest
    image: local-ble-scanner
    container_name: Local-BLE-Scanner
    profiles:
      - linux-hw
    restart: unless-stopped
    privileged: true  # Required for BLE hardware access
    network_mode: host  # Required for hciconfig to see Bluetooth hardware
    environment:
      - DATABASE_HOST=127.0.0.1  # Connect to database exposed on host via published port
      - DATABASE_PORT=${DATABASE_PORT}
      - DATABASE_NAME=${DATABASE_NAME}
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
    volumes:
      - /opt/mishka/config.json:/app/config.json:ro
      - /var/run/dbus:/var/run/dbus  # D-Bus for Bluetooth
      - /sys:/sys  # Full sysfs access for Bluetooth
      - /dev:/dev  # Device access
    depends_on:
      - timescale-database
      - database-setup
    logging:
      driver: "${LOG_DRIVER}"
      options:
        max-size: "${LOG_MAX_SIZE}"
        max-file: "${LOG_MAX_FILES}"
    healthcheck:
      test: ["CMD", "python", "/app/services/data_processing/local_ble_scanner/healthcheck.py"]
      interval: 60s
      timeout: 10s
      retries: 3

  health-monitor:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile-health-monitor
      args:
        SERVICE_BASE_IMAGE: mishka-service-base:latest
    image: health-monitor
    container_name: System-Health-Monitor
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - MONITORING_INTERVAL=${MONITORING_INTERVAL:-60}
    volumes:
      - /opt/mishka/config.json:/app/config.json
      - /var/run/docker.sock:/var/run/docker.sock  # Docker access for container management
      - health_monitor_logs:/app/logs
    depends_on:
      - timescale-database
      - database-setup
    privileged: true  # Required for system monitoring
    logging:
      driver: "${LOG_DRIVER}"
      options:
        max-size: "${LOG_MAX_SIZE}"
        max-file: "${LOG_MAX_FILES}"
    healthcheck:
      test: ["CMD", "python", "-c", "import os; exit(0 if os.path.exists('/app/logs/health_monitor.log') else 1)"]
      interval: 60s
      timeout: 10s
      retries: 3

  update-coordinator:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile-update-coordinator
      args:
        SERVICE_BASE_IMAGE: mishka-service-base:latest
    image: update-coordinator
    container_name: OTA-Update-Coordinator
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - MQTT_BROKER=${MQTT_BROKER}
      - MQTT_PORT=${MQTT_PORT}
      - MQTT_USERNAME=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - RPI_HOST=${RPI_HOST}
    volumes:
      - /opt/mishka/config.json:/app/config.json
      - update_coordinator_logs:/app/logs
    depends_on:
      - timescale-database
      - database-setup
      - mqtt-broker
    logging:
      driver: "${LOG_DRIVER}"
      options:
        max-size: "${LOG_MAX_SIZE}"
        max-file: "${LOG_MAX_FILES}"
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3


  github-firmware-sync:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile-github-firmware-sync
      args:
        SERVICE_BASE_IMAGE: mishka-service-base:latest
    image: github-firmware-sync
    container_name: GitHub-Firmware-Sync
    restart: unless-stopped
    environment:
      - CONFIG_PATH=/app/config.json
      - MQTT_HOST=${MQTT_HOST}
      - MQTT_PORT=${MQTT_PORT}
    volumes:
      - /opt/mishka/config.json:/app/config.json:ro  # Read-only config
      - /opt/mishka/firmware:/app/firmware  # Persistent firmware storage (read-write)
    depends_on:
      - mqtt-broker
    logging:
      driver: "${LOG_DRIVER}"
      options:
        max-size: "${LOG_MAX_SIZE}"
        max-file: "${LOG_MAX_FILES}"
    healthcheck:
      test: ["CMD", "python", "-c", "import os; exit(0 if os.path.exists('/tmp/github_sync_healthy') else 1)"]
      interval: 60s
      timeout: 10s
      retries: 3

  rpi-system-ota-sync:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile-rpi-ota-sync
    image: rpi-system-ota-sync
    container_name: RPI-System-OTA-Sync
    restart: unless-stopped
    environment:
      - CONFIG_PATH=/app/config.json
      - MQTT_HOST=${MQTT_HOST}
      - MQTT_PORT=${MQTT_PORT}
      - DATABASE_HOST=${DATABASE_HOST}
      - DATABASE_PORT=${DATABASE_PORT}
      - DATABASE_NAME=${DATABASE_NAME}
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
    volumes:
      - /opt/mishka/config.json:/app/config.json:ro  # Read-only config
    depends_on:
      - mqtt-broker
      - timescale-database
      - database-setup
    logging:
      driver: "${LOG_DRIVER}"
      options:
        max-size: "${LOG_MAX_SIZE}"
        max-file: "${LOG_MAX_FILES}"
    healthcheck:
      test: ["CMD", "python", "-c", "import os; exit(0 if os.path.exists('/tmp/rpi_ota_sync_healthy') else 1)"]
      interval: 60s
      timeout: 10s
      start_period: 130s
      retries: 3

  rpi-update-coordinator:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile-rpi-update-coordinator
    image: rpi-update-coordinator
    container_name: RPI-Update-Coordinator
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    environment:
      - CONFIG_PATH=/app/config.json
      - PROJECT_ROOT=/host_project
      - HOST_PROJECT_ROOT=${HOST_PROJECT_ROOT:-.}
      - COMPOSE_PROJECT_NAME=rpi
      - DATABASE_HOST=${DATABASE_HOST}
      - DATABASE_PORT=${DATABASE_PORT}
      - DATABASE_NAME=${DATABASE_NAME}
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
    volumes:
      - /opt/mishka/config.json:/app/config.json:ro
      - /var/run/docker.sock:/var/run/docker.sock  # Docker socket for executing updates
      - /tmp:/tmp  # Shared /tmp for trigger files
      - type: bind
        source: ${HOST_PROJECT_ROOT:-.}
        target: /host_project
        read_only: true
    privileged: true  # Required for Docker socket access
    depends_on:
      - timescale-database
      - database-setup
    logging:
      driver: "${LOG_DRIVER}"
      options:
        max-size: "${LOG_MAX_SIZE}"
        max-file: "${LOG_MAX_FILES}"
    healthcheck:
      test: ["CMD", "pgrep", "-f", "rpi_update_coordinator.py"]
      interval: 30s
      timeout: 10s
      retries: 3

  usb-device-monitor:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile-usb-device-monitor
      args:
        SERVICE_BASE_IMAGE: mishka-service-base:latest
    image: usb-device-monitor
    container_name: USB-Device-Monitor
    restart: unless-stopped
    privileged: true  # Required for USB device access
    environment:
      - CONFIG_PATH=/app/config.json
      - MQTT_HOST=${MQTT_HOST}
      - MQTT_PORT=${MQTT_PORT}
    volumes:
      - /opt/mishka/config.json:/app/config.json:ro  # Read-only config
      - /dev:/dev  # USB device passthrough
      - /run/udev:/run/udev:ro  # udev socket for real-time events
    depends_on:
      - mqtt-broker
    logging:
      driver: "${LOG_DRIVER}"
      options:
        max-size: "${LOG_MAX_SIZE}"
        max-file: "${LOG_MAX_FILES}"
    healthcheck:
      test: ["CMD", "python", "-c", "import os; exit(0 if os.path.exists('/tmp/usb_monitor_healthy') else 1)"]
      interval: 60s
      timeout: 10s
      retries: 3

volumes:
  timescale_database_data:
  shared_device_data:
  health_monitor_logs:
  update_coordinator_logs:
  pgweb_bookmarks:
